<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gconf — agentic flow / редакционная версия</title>
  <style>
    html,body,iframe{margin:0;width:100%;height:100%;border:0;background:#f7f4ee}
    iframe{display:block;height:100vh}
  </style>
</head>
<body>
  <iframe id="article" src="./index.html" title="agentic flow — редакционная версия"></iframe>
  <script>
    const frame=document.querySelector('#article');
    frame.addEventListener('load',()=>{
      const doc=frame.contentDocument;
      const style=doc.createElement('style');
      style.textContent=`
        html,body{background:#f7f4ee!important;color:#202124!important}
        .research-reading{max-width:1260px!important;grid-template-columns:minmax(0,840px) 300px!important;gap:42px!important;padding:56px 28px 100px!important}
        .reading-paper{border:1px solid #ded7ca!important;box-shadow:0 24px 60px rgba(58,46,30,.08)!important;overflow:hidden!important}
        .reader-intro{padding:72px 72px 52px;border-bottom:1px solid #ded7ca}.reader-intro .eyebrow{margin:0 0 22px;color:#1D3DF0;font:500 13px/1.2 'DM Mono',monospace;letter-spacing:.12em;text-transform:uppercase}.reader-intro h1{max-width:730px;margin:0;font:600 clamp(48px,5.2vw,74px)/1.05 Onest,Arial,sans-serif;letter-spacing:-.065em;color:#202124}.reader-intro .lead{max-width:700px;margin:30px 0 0;font:400 22px/1.62 Onest,Arial,sans-serif;color:#282a2f}
        .research-toc{top:24px!important;border-color:#ded7ca!important;background:rgba(255,253,248,.92)!important;padding:22px 18px!important}
        .research-toc .toc-kicker,.research-toc a.is-active,.term{color:#1D3DF0!important}
        .research-toc a{color:#315b68!important;font:500 14px/1.38 Onest,Arial,sans-serif!important;padding:8px 0!important}
        .reading-paper>header{display:none!important}.reading-paper>header>div:nth-child(5){padding:64px 72px 20px!important}
        .reading-paper>header h1{font-size:clamp(46px,5.1vw,72px)!important;line-height:1.08!important;letter-spacing:-.06em!important}
        .reading-paper>header>div:nth-child(6){padding:0 72px 52px!important}
        .reading-paper>header>div:nth-child(6) p{max-width:700px!important;font-size:20px!important;line-height:1.58!important}
        .reading-paper [data-screen-label="opening"]{padding:52px 72px!important}
        .reading-paper [data-screen-label="opening"] h2{font-family:Onest,Arial,sans-serif!important;font-size:31px!important;line-height:1.26!important;letter-spacing:-.04em!important}
        .reading-paper [data-screen-label="opening"]>div:nth-child(2){font-size:20px!important;line-height:1.72!important}
        .reading-paper [data-screen-label="updates"] article{padding:56px 72px!important;border-top:1px solid #ded7ca!important}
        .reading-paper [data-screen-label="updates"] article>div:first-child{display:none!important}
        .reading-paper [data-screen-label="updates"] article>div:nth-child(2) h3{font-family:Onest,Arial,sans-serif!important;font-size:34px!important;line-height:1.2!important;letter-spacing:-.045em!important;margin:0 0 22px!important}
        .reading-paper [data-screen-label="updates"] article>div:nth-child(2) p,.reading-paper [data-screen-label="updates"] article>div:nth-child(2) li{max-width:700px!important;font-size:20px!important;line-height:1.7!important;color:#282a2f!important}
        .reading-paper [data-screen-label="updates"] article>div:nth-child(2) ul,.reading-paper [data-screen-label="updates"] article>div:nth-child(2) ol{margin:22px 0!important}
        .reading-paper [data-screen-label="updates"] article aside{max-width:700px!important;margin:28px 0 0!important;padding:16px 18px!important;background:transparent!important;border-left:3px solid #1D3DF0!important;font-size:15px!important;line-height:1.55!important}
        .reading-paper [data-screen-label="updates"] figure{max-width:700px!important}
        .reading-paper [data-screen-label="updates"] figure>div:has(.gconf-shot){height:auto!important;aspect-ratio:16/10!important}
        .reading-paper [data-screen-label="updates"] .gconf-shot{height:auto!important;aspect-ratio:16/10!important;object-fit:cover!important}
        .reading-paper>[data-screen-label="cut"]{padding:48px 72px!important;background:#fff!important;color:#202124!important;border-top:1px solid #ded7ca!important}
        .reading-paper>[data-screen-label="cut"] p{font:600 32px/1.22 Onest,Arial,sans-serif!important;color:#202124!important}
        .reading-paper>#test>div:first-child>div,.reading-paper>#test>div:nth-child(2),.reading-paper .maturity-row,.reading-paper>#test>div:last-child,.reading-paper>[data-screen-label="meta-skill"]>div{padding-left:72px!important;padding-right:72px!important}
        .reading-paper>#test>div:first-child h2,.reading-paper>[data-screen-label="meta-skill"] h2{font-family:Onest,Arial,sans-serif!important;font-size:36px!important;line-height:1.18!important;letter-spacing:-.045em!important}
        .reading-paper .maturity-row{grid-template-columns:22px 66px 230px minmax(0,1fr)!important;padding-top:18px!important;padding-bottom:18px!important}
        .reading-paper .maturity-row h3{font-family:Onest,Arial,sans-serif!important;font-size:18px!important}.reading-paper .maturity-row p{font-size:15px!important;line-height:1.48!important}
        /* substack-like reader: one quiet column, no product chrome */
        html,body{background:#fff!important}.research-reading{display:block!important;max-width:720px!important;margin:0 auto!important;padding:0 24px 96px!important}.reading-paper{border:0!important;box-shadow:none!important;overflow:visible!important}.research-toc{display:none!important}.reader-intro{padding:72px 0 42px!important;border-bottom:1px solid #e6e6e6!important}.reader-intro .eyebrow{color:#1D3DF0!important;font-size:12px!important}.reader-intro h1{font-size:58px!important;line-height:1.02!important;letter-spacing:-.06em!important}.reader-intro .lead{margin-top:24px!important;font:400 21px/1.48 Georgia,serif!important;color:#565B73!important}.reading-paper [data-screen-label="opening"],.reading-paper [data-screen-label="updates"] article{padding:46px 0!important;border-top:0!important;border-bottom:1px solid #e6e6e6!important}.reading-paper [data-screen-label="opening"] h2,.reading-paper [data-screen-label="updates"] article>div:nth-child(2) h3{font:600 31px/1.18 Onest,Arial,sans-serif!important;letter-spacing:-.045em!important}.reading-paper [data-screen-label="opening"]>div:nth-child(2),.reading-paper [data-screen-label="updates"] article>div:nth-child(2) p,.reading-paper [data-screen-label="updates"] article>div:nth-child(2) li{max-width:680px!important;font:400 20px/1.62 Georgia,serif!important;color:#202124!important}.reading-paper [data-screen-label="updates"] article aside{max-width:680px!important;margin:28px 0 0!important;padding:0 0 0 18px!important;border-left:2px solid #1D3DF0!important;background:transparent!important;font:400 16px/1.5 Georgia,serif!important}.reading-paper>[data-screen-label="cut"]{padding:46px 0!important;background:#fff!important;border-bottom:1px solid #e6e6e6!important}.reading-paper>[data-screen-label="cut"] p{font:600 30px/1.24 Onest,Arial,sans-serif!important}.reading-paper>#test>div:first-child>div,.reading-paper>#test>div:nth-child(2),.reading-paper .maturity-row,.reading-paper>#test>div:last-child,.reading-paper>[data-screen-label="meta-skill"]>div{padding-left:0!important;padding-right:0!important}.reading-paper>[data-screen-label="meta-skill"]>div:last-child{grid-template-columns:1fr!important}.reading-paper .maturity-row{grid-template-columns:22px 60px 1fr!important}.reading-paper .maturity-row p{grid-column:3!important}.reading-paper>[data-screen-label="stories"]{display:none!important}
        @media(max-width:980px){.research-reading{display:block!important;padding:0!important}.reading-paper{border:0!important;box-shadow:none!important}.research-toc{position:static!important}.reader-intro,.reading-paper>header>div:nth-child(5),.reading-paper>header>div:nth-child(6),.reading-paper [data-screen-label="opening"],.reading-paper [data-screen-label="updates"] article,.reading-paper>[data-screen-label="cut"]{padding-left:24px!important;padding-right:24px!important}.reader-intro{padding-top:48px!important;padding-bottom:38px!important}.reader-intro .lead{font-size:19px!important}.reading-paper [data-screen-label="updates"] article>div:nth-child(2) h3{font-size:28px!important}.reading-paper [data-screen-label="updates"] article>div:nth-child(2) p,.reading-paper [data-screen-label="updates"] article>div:nth-child(2) li{font-size:18px!important}.reading-paper>#test>div:first-child>div,.reading-paper>#test>div:nth-child(2),.reading-paper .maturity-row,.reading-paper>#test>div:last-child,.reading-paper>[data-screen-label="meta-skill"]>div{padding-left:24px!important;padding-right:24px!important}.reading-paper .maturity-row{grid-template-columns:22px 1fr!important}}
      `;
      doc.head.append(style);
      const paper=doc.querySelector('.reading-paper');
      const header=paper.querySelector('header');
      if(header){
        const intro=doc.createElement('section');
        intro.className='reader-intro';
        intro.innerHTML='<p class="eyebrow">gconf / agentic flow / long read</p><h1>за последнюю неделю изменилось всё.</h1><p class="lead">chatgpt work, codex, gpt live, fable и gpt-5.6 — что изменилось в мире агентов и что это значит для каждого из нас.</p>';
        paper.insertBefore(intro,header);
      }
    });
  </script>
</body>
</html>
