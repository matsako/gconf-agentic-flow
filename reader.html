<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gconf — за последнюю неделю изменилось всё</title>
  <meta name="description" content="семь обновлений, которые изменят представление о текущем уровне развития агентов">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='50' fill='%231d3df0'/><text x='50' y='68' text-anchor='middle' font-size='58' font-family='serif' font-weight='700' fill='white'>g</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#17181d;--muted:#656974;--line:#e5e5e5;--blue:#1d3df0;--lime:#bff52e;--paper:#fff}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia,'Times New Roman',serif;-webkit-font-smoothing:antialiased}
    a{color:var(--blue);text-underline-offset:3px}.progress{position:fixed;z-index:20;top:0;left:0;width:0;height:3px;background:var(--blue)}
    .masthead{position:relative;z-index:10;height:58px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.94);backdrop-filter:blur(12px)}.masthead-inner{max-width:1080px;height:100%;margin:auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}.brand{font:700 17px/1 Onest,sans-serif;color:var(--blue);text-decoration:none}.edition{font:500 11px/1 DM Mono,monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .article{width:min(780px,calc(100% - 40px));margin:0 auto}.hero{padding:54px 0 42px;border-bottom:1px solid var(--line);animation:rise .55s ease both}.kicker,.chapter{font:500 11px/1.35 DM Mono,monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--blue)}h1{margin:16px 0 20px;font:650 clamp(44px,5vw,60px)/1.01 Onest,sans-serif;letter-spacing:-.06em}.dek{max-width:720px;margin:0;color:var(--muted);font-size:19px;line-height:1.48}.byline{display:flex;gap:10px;align-items:center;margin-top:24px;color:var(--muted);font:500 11px/1.4 Onest,sans-serif}.avatar{display:grid;place-items:center;width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;font:700 11px/1 DM Mono,monospace}
    .story-section{padding:40px 0;border-bottom:1px solid var(--line)}.story-section h2{margin:12px 0 20px;font:650 29px/1.16 Onest,sans-serif;letter-spacing:-.04em}.story-section p,.story-section li{font-size:17px;line-height:1.62}.story-section p{margin:0 0 17px}.story-section ul,.story-section ol{margin:17px 0;padding-left:22px}.story-section li{margin:7px 0}.story-section li::marker{color:var(--blue)}.story-section strong,.story-section b{font-family:Onest,sans-serif;font-weight:650}.story-section figure{margin:26px 0}.story-section img{display:block;width:100%;height:auto;border:1px solid #d8d8d8}.story-section figcaption{margin-top:8px;color:var(--muted);font:500 10px/1.4 DM Mono,monospace;text-transform:uppercase;letter-spacing:.04em}.takeaway{margin:24px 0 0;padding:1px 0 1px 17px;border-left:3px solid var(--blue);color:#333;font-size:15px;line-height:1.52}.takeaway b{display:block;margin-bottom:4px;color:var(--blue);font:500 10px/1.3 DM Mono,monospace;text-transform:uppercase;letter-spacing:.08em}.takeaway br{display:none}.term{color:var(--blue);border-bottom:1px dotted var(--blue);cursor:help}
    .maturity{padding:46px 0;border-bottom:1px solid var(--line)}.maturity h2,.meta-section h2{margin:12px 0 15px;font:650 32px/1.12 Onest,sans-serif;letter-spacing:-.045em}.maturity-intro{color:var(--muted);font-size:17px;line-height:1.5}.baseline{margin-top:26px;padding:15px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.baseline h3{margin:0 0 6px;font:650 18px/1.2 Onest,sans-serif}.baseline p{margin:0;color:var(--muted);font-size:15px;line-height:1.46}.level{display:grid;grid-template-columns:25px 1fr;gap:13px;padding:17px 0;border-bottom:1px solid var(--line);cursor:pointer}.level input{position:absolute;opacity:0}.check{width:20px;height:20px;border:1.5px solid var(--blue);transition:.15s}.level:has(input:checked) .check{background:var(--blue);box-shadow:inset 0 0 0 5px #fff}.level h3{margin:0 0 5px;font:650 18px/1.2 Onest,sans-serif}.level p{margin:0;color:var(--muted);font-size:15px;line-height:1.44}.score{margin-top:18px;padding:17px;background:#17181d;color:#fff}.score strong{display:block;margin-bottom:7px;color:var(--lime);font:500 11px/1 DM Mono,monospace}.score p{margin:0;font:600 16px/1.36 Onest,sans-serif}
    .meta-section{padding:46px 0;border-bottom:1px solid var(--line)}.meta-section>p{font-size:17px;line-height:1.58}.meta-item{padding:22px 0;border-top:1px solid var(--line)}.meta-item h3{margin:7px 0 9px;font:650 22px/1.15 Onest,sans-serif}.meta-item p{margin:0;color:var(--muted);font-size:16px;line-height:1.52}
    .offer{margin:48px 0;padding:30px 0;border-top:3px solid var(--blue);border-bottom:1px solid var(--line)}.offer h2{margin:0 0 14px;font:650 31px/1.12 Onest,sans-serif;letter-spacing:-.045em}.offer p{font-size:17px;line-height:1.5}.offer-facts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:22px 0}.fact{padding:10px 0;border-top:1px solid var(--line);font:500 11px/1.4 DM Mono,monospace;color:var(--muted)}.fact b{display:block;margin-top:3px;color:var(--ink);font:650 15px/1.25 Onest,sans-serif}.button{display:inline-flex;margin-top:8px;padding:14px 18px;background:var(--blue);color:#fff;text-decoration:none;font:650 13px/1 Onest,sans-serif}.footer{padding:0 0 64px}.footer blockquote{margin:0;font:650 27px/1.22 Onest,sans-serif;letter-spacing:-.04em}.footer blockquote span{color:var(--blue)}.footer small{display:block;margin-top:10px;color:var(--muted);font:500 10px/1.4 DM Mono,monospace;text-transform:uppercase}.related{display:grid;gap:7px;margin-top:30px}.related a{font:500 13px/1.42 Onest,sans-serif}
    .loading{padding:100px 0;color:var(--muted);font:500 14px/1.5 DM Mono,monospace}@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    @media(max-width:680px){.masthead{height:50px}.edition{display:none}.article{width:min(100% - 30px,780px)}.hero{padding:40px 0 30px}h1{font-size:37px}.dek{font-size:17px}.story-section,.maturity,.meta-section{padding:34px 0}.story-section h2{font-size:25px}.story-section p,.story-section li{font-size:16.5px;line-height:1.57}.maturity h2,.meta-section h2{font-size:28px}.offer-facts{grid-template-columns:1fr}.footer blockquote{font-size:24px}}
    @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}.hero{animation:none}}
  </style>
</head>
<body>
  <div class="progress" id="progress"></div>
  <header class="masthead"><div class="masthead-inner"><a class="brand" href="./">gconf</a><span class="edition">agentic flow · 15 июля 2026</span></div></header>
  <main class="article" id="article"><p class="loading">собираем статью…</p></main>
  <script>
    const article=document.querySelector('#article');
    const clean=node=>{const copy=node.cloneNode(true);copy.querySelectorAll('[style],script,link').forEach(el=>{el.removeAttribute('style');if(el.tagName==='SCRIPT'||el.tagName==='LINK')el.remove()});copy.removeAttribute?.('style');return copy};
    const text=node=>node?.textContent.trim()||'';
    const chapter=(num,label)=>`<span class="chapter">${String(num).padStart(2,'0')} / ${label}</span>`;
    const scoreCopy=n=>n===0?'вы ускоряете мышление. первый сдвиг — собрать один используемый результат.':n<=2?'вы ускоряете производство. следующий шаг — соединить результаты в повторяемый процесс.':n<=5?'вы уже делегируете действия. теперь нужны границы, доступы и правила.':n<=8?'вы меняете операционку. следующий узел — командная память и готовые сценарии.':'у вас появляется управление процессом: агент действует внутри правил, человек подключается в точках решений.';

    async function build(){
      const html=await fetch('./index.html',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('source unavailable');return r.text()});
      const src=new DOMParser().parseFromString(html,'text/html');
      article.innerHTML='';

      article.insertAdjacentHTML('beforeend',`<section class="hero"><span class="kicker">gconf / agentic flow / long read</span><h1>за последнюю неделю изменилось всё.</h1><p class="dek">chatgpt work, codex, gpt live, fable и gpt-5.6 — что изменилось в мире агентов и что это значит для каждого из нас.</p><div class="byline"><span class="avatar">g</span><span>gconf · 7 обновлений · 18 минут чтения</span></div></section>`);

      const opening=src.querySelector('[data-screen-label="opening"]');
      const openingSection=document.createElement('section');openingSection.className='story-section';
      const openingTitle=opening.querySelector('h2');openingSection.innerHTML=chapter(0,'поворот');
      const h2=document.createElement('h2');h2.textContent=text(openingTitle);openingSection.append(h2);
      const openingCopy=opening.querySelector('div:nth-child(2)');[...openingCopy.children].forEach(el=>openingSection.append(clean(el)));article.append(openingSection);

      [...src.querySelectorAll('[data-screen-label="updates"] > article')].forEach((source,index)=>{
        const section=document.createElement('section');section.className='story-section';section.id=`chapter-${index+1}`;section.innerHTML=chapter(index+1,'обновление');
        const content=source.querySelector(':scope > div:nth-child(2)');
        const title=content.querySelector('h3');const heading=document.createElement('h2');heading.textContent=text(title);section.append(heading);
        [...content.children].filter(el=>el!==title).forEach(el=>section.append(clean(el)));
        const aside=source.querySelector(':scope > aside');if(aside){const note=clean(aside);note.className='takeaway';section.append(note)}
        article.append(section);
      });

      const maturitySource=src.querySelector('#test');
      const maturity=document.createElement('section');maturity.className='maturity';maturity.id='maturity';
      maturity.innerHTML=`${chapter(8,'карта зрелости')}<h2>как понять, на каком слое вы находитесь</h2><p class="maturity-intro">отметьте каждый слой, который уже работает у вас. не теория — реальный контур жизни или работы.</p>`;
      const baselineSource=maturitySource.querySelector(':scope > div:nth-child(2)');
      maturity.insertAdjacentHTML('beforeend',`<div class="baseline"><h3>${text(baselineSource.querySelector('h3'))}</h3><p>${text(baselineSource.querySelector('p'))}</p></div>`);
      [...maturitySource.querySelectorAll('.maturity-row')].forEach((row,index)=>{const label=document.createElement('label');label.className='level';label.innerHTML=`<input type="checkbox"><span class="check"></span><div><h3>${text(row.querySelector('h3'))}</h3><p>${text(row.querySelector('p .maturity-copy')||row.querySelector('p'))}</p></div>`;maturity.append(label)});
      maturity.insertAdjacentHTML('beforeend','<div class="score"><strong id="score">0 / 9</strong><p id="score-copy">'+scoreCopy(0)+'</p></div>');article.append(maturity);

      const metaSource=src.querySelector('[data-screen-label="meta-skill"]');
      const meta=document.createElement('section');meta.className='meta-section';meta.innerHTML=`${chapter(9,'мета-навыки')}<h2>${text(metaSource.querySelector('h2'))}</h2>`;
      metaSource.querySelectorAll(':scope > div:nth-child(2) > p').forEach(p=>meta.append(clean(p)));
      metaSource.querySelectorAll('article').forEach(item=>{const block=document.createElement('div');block.className='meta-item';block.innerHTML=`<span class="chapter">${text(item.querySelector('span'))}</span><h3>${text(item.querySelector('h3'))}</h3><p>${text(item.querySelector('p'))}</p>`;meta.append(block)});article.append(meta);

      const offerSource=src.querySelector('[data-screen-label="offer"]');
      const offer=document.createElement('section');offer.className='offer';offer.innerHTML=`<h2>${text(offerSource.querySelector('h2'))}</h2><p>${text(offerSource.querySelector(':scope > div:nth-child(2) > p'))}</p><div class="offer-facts"></div>`;
      offerSource.querySelectorAll(':scope > div:nth-child(2) > div span').forEach(span=>{const fact=document.createElement('div');fact.className='fact';fact.innerHTML=clean(span).innerHTML;offer.querySelector('.offer-facts').append(fact)});
      const sourceButton=offerSource.querySelector('a');const button=document.createElement('a');button.className='button';button.href=sourceButton.href;button.target='_blank';button.textContent=text(sourceButton);offer.append(button);article.append(offer);

      const footerSource=src.querySelector('footer');const footer=document.createElement('footer');footer.className='footer';
      const quote=text(footerSource.querySelector('h2')).replace(/^«|»$/g,'');footer.innerHTML=`<blockquote>«${quote.replace('просто жить.','<span>просто жить.</span>')}»</blockquote><small>цитата участника</small><div class="related"></div>`;
      footerSource.querySelectorAll('a').forEach(a=>{const link=document.createElement('a');link.href=a.href;link.target='_blank';link.textContent=text(a);footer.querySelector('.related').append(link)});article.append(footer);

      const updateScore=()=>{const n=document.querySelectorAll('.level input:checked').length;document.querySelector('#score').textContent=`${n} / 9`;document.querySelector('#score-copy').textContent=scoreCopy(n)};
      document.querySelectorAll('.level input').forEach(input=>input.addEventListener('change',updateScore));
    }
    build().catch(()=>{article.innerHTML='<p class="loading">не удалось загрузить статью. обновите страницу.</p>'});
    addEventListener('scroll',()=>{const max=document.documentElement.scrollHeight-innerHeight;document.querySelector('#progress').style.width=`${max>0?scrollY/max*100:0}%`},{passive:true});
  </script>
</body>
</html>
